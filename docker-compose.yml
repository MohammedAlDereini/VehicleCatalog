services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: vehicle-catalog:latest
    container_name: vehicle-catalog
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      # Optional NHTSA client overrides (defaults live in appsettings.json):
      # - Nhtsa__TimeoutSeconds=30
      # - Nhtsa__MakesCacheHours=24
      # - Nhtsa__LookupCacheHours=6
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
